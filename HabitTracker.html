<style>
  :root{
    --beige:#221F1A;
    --amber:#635A52;
    --teal:#9E9EA0;
    --sage:#A69689;
    --sage-soft:#A69689;
    --navy:#DECDBD;
    --navy-soft:#C9B8A8;
    --blue:#DECDBD;
    --rose:#EAE0D4;
    --brown:#DECDBD;
    --paper:#29251D;
    --card:#CDC0AF;
    --ink:#F7F6F3;
    --ink-soft:#DECDBD;
    --line:rgba(222,205,189,0.22);
    --shadow:0 2px 10px rgba(0,0,0,0.25), 0 1px 2px rgba(0,0,0,0.18);
    --radius:16px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;color-scheme:dark;}
  body{
    background:var(--paper);
    background-image:
      radial-gradient(circle at 8% 12%, rgba(222,205,189,0.08) 0%, transparent 40%),
      radial-gradient(circle at 92% 85%, rgba(166,150,137,0.10) 0%, transparent 45%);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  h1,h2,h3,.display{
    font-family:'Fraunces', serif;
    font-weight:600;
    letter-spacing:-0.01em;
    color:var(--rose);
    margin:0;
  }

  .mono{font-family:'Space Mono', monospace;}

  a{color:var(--blue);}

  /* ---------- Layout ---------- */
  .app{
    display:flex;
    max-width:1280px;
    margin:0 auto;
    min-height:100vh;
    align-items:stretch;
  }

  .sidebar{
    background:var(--card);
    border-right:1px solid var(--line);
    width:280px;
    flex-shrink:0;
  }
  .sidebar-content{
    flex:1;
    display:flex;
    flex-direction:column;
  }
  .sidebar-inner{
    padding:28px 22px;
    display:flex;
    flex-direction:column;
    gap:26px;
    position:sticky;
    top:0;
    max-height:100vh;
    overflow-y:auto;
  }

  .main{
    padding:28px 32px 60px;
    min-width:0;
    flex:1;
  }

  /* ---------- Brand ---------- */
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .brand-mark{
    width:34px;height:34px;
    border-radius:10px;
    background:linear-gradient(160deg, var(--teal) 0%, var(--blue) 100%);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .brand-mark svg{width:18px;height:18px;}
  .brand h1{font-size:21px;color:#29251D;}
  .brand-sub{font-size:11px;color:var(--ink-soft);font-family:'Space Mono',monospace;letter-spacing:0.04em;text-transform:uppercase;margin-top:1px;}

  /* ---------- Milestone carousel ---------- */
  .milestones-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:12px;
  }
  .milestones-header-left{display:flex;align-items:center;gap:12px;}
  .milestones-label{
    font-family:'Space Mono',monospace;
    font-size:11px;
    letter-spacing:0.07em;
    text-transform:uppercase;
    color:var(--ink-soft);
  }
  .past-milestones-link{
    font-size:12px;
    font-weight:600;
    color:var(--blue);
    background:none;
    border:none;
    cursor:pointer;
    text-decoration:underline;
    text-decoration-color:rgba(6,132,229,0.35);
    padding:0;
  }
  .milestones-carousel-wrap{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:26px;
  }
  .carousel-arrow{
    width:34px;height:34px;border-radius:50%;
    border:1px solid var(--line);
    background:var(--card);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    box-shadow:var(--shadow);
    transition:background .15s, opacity .15s;
  }
  .carousel-arrow:hover{background:var(--sage-soft);}
  .carousel-arrow:disabled{opacity:0.3;cursor:default;}
  .carousel-arrow:disabled:hover{background:var(--card);}
  .carousel-arrow svg{width:15px;height:15px;stroke:#171613;}

  .milestones{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    flex:1;
    min-width:0;
  }
  .milestone-card{
    background:var(--card);
    border-radius:var(--radius);
    border:1px solid var(--line);
    box-shadow:var(--shadow);
    padding:18px 20px;
    position:relative;
    overflow:hidden;
  }
  .milestone-card::before{
    content:'';
    position:absolute;
    left:0;top:0;bottom:0;
    width:5px;
    background:var(--accent, var(--teal));
  }
  .milestone-card-top{display:flex;align-items:flex-start;justify-content:space-between;}
  .milestone-eyebrow{
    font-family:'Space Mono',monospace;
    font-size:10.5px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:#171613;
    margin-bottom:6px;
  }
  .milestone-edit-btn{
    width:24px;height:24px;border-radius:7px;
    border:none;background:transparent;

<body>

<div class="app">

  <!-- ================= SIDEBAR ================= -->

<script>
/* =========================================================
   DATA LAYER — Google Sheets via Apps Script
   ========================================================= */

const API_URL = 'https://script.google.com/macros/s/AKfycbw9k7PiMol4foy-yGN5FIOpbb2kw2T2kl3kteedPH0FqC3x_qj7qK2a7rEavCugHuZ8Tg/exec';

const TODAY = new Date(); TODAY.setHours(0,0,0,0);

const MILESTONE_COLOR = '#29251D';

let MILESTONES = [];
let DATA_LOADED = false;
let SAVE_QUEUE = Promise.resolve(); // serializes writes so rapid clicks don't race each other

function parseISODate(iso){
  const [y,m,d] = String(iso).split('-').map(Number);
  return new Date(y, m-1, d);
}

function getActiveMilestones(){
  return MILESTONES.filter(m => parseISODate(m.date) >= TODAY).sort((a,b)=>parseISODate(a.date)-parseISODate(b.date));
}
function getPastMilestones(){
  return MILESTONES.filter(m => parseISODate(m.date) < TODAY).sort((a,b)=>parseISODate(b.date)-parseISODate(a.date));
}
function findMilestoneOnDate(date){
  return MILESTONES.find(m => isSameDate(parseISODate(m.date), date));
}

function getTaskDefForDate(date){
  const dow = date.getDay(); // 0 = Sun

  if(dow === 0){ // Sunday — explicit order: Water, Church, Steps 10k, Review Trading/Charts, Finance
    return [
      {id:'water', label:'Water — 3 to 4 refills (24oz)', short:'Water', sidebarLabel:'Water (72 oz)', type:'water', max:4, goal:3},
      {id:'church', label:'Church / online church', short:'Church', sidebarLabel:'Church', type:'check'},
      {id:'steps', label:'10,000+ steps', short:'Steps 10k', sidebarLabel:'Steps', type:'check'},
      {id:'trade_review', label:'Review trading / charts for the week ahead', short:'Review Trading/Charts', sidebarLabel:'Review Trading/Charts', type:'check'},
      {id:'finance_checkin', label:'Finance check-in', short:'Finance', sidebarLabel:'Finance Check-Ins', type:'check'}
    ];
  }

  const tasks = [];
  tasks.push({id:'water', label:'Water — 3 to 4 refills (24oz)', short:'Water', sidebarLabel:'Water (72 oz)', type:'water', max:4, goal:3});

  if(dow === 3 || dow === 6){ // Wed, Sat
    tasks.push({id:'walk_outside', label:'Outdoor walk or hike (active recovery)', short:'Walk/Hike', sidebarLabel:'Walk/Hike', type:'check'});
    tasks.push({id:'steps', label:'10,000+ steps', short:'Steps 10k', sidebarLabel:'Steps', type:'check'});
  } else { // Mon Tue Thu Fri
    tasks.push({id:'workout', label:'30-min weights + 30-min incline walk + stretch', short:'Weights + Incline Walk + Stretch', sidebarLabel:'Weights + Incline Walk + Stretch', type:'check'});
    tasks.push({id:'steps', label:'9,000+ steps', short:'Steps 9k', sidebarLabel:'Steps', type:'check'});
  }

  if(dow !== 6){
    tasks.push({id:'diet', label:'Diet — no cheat meals, alcohol, or vape', short:'Diet', sidebarLabel:'Diet = No alcohol + No Vape + No Cheat Meal', type:'check'});
  }

  if(dow !== 6){
    tasks.push({id:'reading', label:'Read for 15 minutes', short:'Read', sidebarLabel:'Read (15 mins)', type:'check'});
  }

  return tasks;
}

// In-memory cache of completion state, keyed by yyyy-mm-dd then task id.
// Hydrated from the Sheet on load; writes go back to the Sheet via saveDayToServer().
const STORE = {};

function dateKey(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function getState(date){
  const key = dateKey(date);
  if(!STORE[key]) STORE[key]={};
  return STORE[key];
}

/* ---- Convert a raw Sheet row into our STORE's boolean/number state shape ---- */
function rowToState(row){
  const state = {};
  ['diet','workout','walk_outside','reading','church','trade_review','finance_checkin'].forEach(col=>{
    const v = row[col];
    state[col] = (v === true || v === 'TRUE' || v === 'true' || v === 1);
  });
  state.steps = (row.steps === true || row.steps === 'TRUE' || row.steps === 'true' || row.steps === 1);
  const waterVal = Number(row.water);
  state.water = isNaN(waterVal) ? 0 : waterVal;
  return state;
}

/* ---- Convert our STORE's state shape back into a flat row for the Sheet ---- */
function stateToRow(date, state){
  return {
    date: dateKey(date),
    diet: !!state.diet,
    workout: !!state.workout,
    walk_outside: !!state.walk_outside,
    steps: !!state.steps,
    water: state.water || 0,
    reading: !!state.reading,
    church: !!state.church,
    trade_review: !!state.trade_review,
    finance_checkin: !!state.finance_checkin
  };
}

/* ---- Initial load: fetch all days + milestones from the Sheet ---- */
async function loadAllData(){
  try{
    const res = await fetch(API_URL);
    const data = await res.json();
    if(!data.success) throw new Error(data.error || 'Unknown server error');

    data.days.forEach(row=>{
      if(!row.date) return;
      const key = String(row.date).split('T')[0]; // handles both 'YYYY-MM-DD' and ISO datetime strings
      STORE[key] = rowToState(row);
    });

    MILESTONES = (data.milestones || []).map(m => ({
      id: String(m.id),
      name: m.name,
      startDate: m.startDate ? String(m.startDate).split('T')[0] : '',
      date: String(m.date).split('T')[0],
      color: m.color || MILESTONE_COLOR
    }));

    DATA_LOADED = true;
  } catch(err){
    console.error('Failed to load habit tracker data:', err);
    showLoadError();
  }
}

function showLoadError(){
  const grid = document.getElementById('monthGrid');
  if(grid){
    grid.insertAdjacentHTML('afterbegin', `
      <div style="grid-column:1/-1; padding:16px; background:#3A2E22; border:1px solid #DECDBD; border-radius:10px; color:#F7F6F3; font-size:13px; margin-bottom:10px;">
        Couldn't load your data from Google Sheets. Check your internet connection and try refreshing. Changes you make now won't be saved until this is fixed.
      </div>
    `);
  }
}

/* ---- Save a single day's state back to the Sheet (debounced/queued) ---- */
function saveDayToServer(date){
  const state = getState(date);
  const row = stateToRow(date, state);
  SAVE_QUEUE = SAVE_QUEUE.then(()=>
    fetch(API_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'}, // avoids CORS preflight on Apps Script
      body: JSON.stringify({action:'saveDay', day: row})
    }).catch(err=>console.error('Save failed for', row.date, err))
  );
}

function saveMilestoneToServer(milestone){
  SAVE_QUEUE = SAVE_QUEUE.then(()=>
    fetch(API_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({action:'saveMilestone', milestone})
    }).catch(err=>console.error('Save failed for milestone', milestone.id, err))
  );
}

function deleteMilestoneFromServer(id){
  SAVE_QUEUE = SAVE_QUEUE.then(()=>
    fetch(API_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({action:'deleteMilestone', id})
    }).catch(err=>console.error('Delete failed for milestone', id, err))
  );
}

function isTaskDone(state, task){
  if(task.type==='water') return (state[task.id]||0) >= (task.goal || task.max);
  return !!state[task.id];
}

function taskCredit(state, task){
  // Returns a fractional credit from 0 to 1 for how complete this single task is.
  if(task.type==='water'){
    const goal = task.goal || task.max;
    const filled = state[task.id] || 0;
    return Math.min(filled / goal, 1);
  }
  return state[task.id] ? 1 : 0;
}

function dayCompletion(date){
  const tasks = getTaskDefForDate(date);
  const state = getState(date);
  const done = tasks.filter(t=>isTaskDone(state,t)).length;
  const creditSum = tasks.reduce((sum,t)=>sum + taskCredit(state,t), 0);
  const frac = tasks.length ? creditSum / tasks.length : 0;
  return {done, total:tasks.length, frac};
}

function dayStateClass(date){
  if(date > TODAY) return 'state-none';
  const {frac} = dayCompletion(date);
  if(frac >= 0.999) return 'state-complete';
  if(frac > 0) return 'state-partial';
  return 'state-none';
}

/* =========================================================
   RENDER: MONTH GRID (checkboxes live inside each day cell)
   ========================================================= */
let viewMonth = TODAY.getMonth();
let viewYear = TODAY.getFullYear();
let currentView = 'month';

function renderMiniTaskHtml(date, task, state){
  const done = isTaskDone(state, task);
  const isFuture = date > TODAY;

  if(task.type === 'water'){
    const filled = state[task.id]||0;
    const dots = [0,1,2,3].map(i=>
      `<div class="mini-water-dot ${i<filled?'filled':''}" data-water-idx="${i}" data-task="${task.id}"></div>`
    ).join('');
    return `
      <div class="mini-water">
        <span class="mini-water-label">${task.short}</span>
        <div class="mini-water-dots">${dots}</div>
      </div>
    `;
  }

  return `
    <div class="mini-task ${done?'checked':''}" data-task="${task.id}">
      <div class="mini-checkbox"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7"/></svg></div>
      <span class="mini-task-label">${task.short}</span>
    </div>
  `;
}

function wireDayCellEvents(cell, date){
  if(date > TODAY) return; // future days are locked, view-only
  const state = getState(date);

  cell.querySelectorAll('.mini-task').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      const taskId = el.dataset.task;
      state[taskId] = !state[taskId];
      saveDayToServer(date);
      renderMonth();
      renderSidebarStats();
    });
  });

  cell.querySelectorAll('.mini-water-dot').forEach(dot=>{
    dot.addEventListener('click', (e)=>{
      e.stopPropagation();
      const idx = parseInt(dot.dataset.waterIdx);
      const taskId = dot.dataset.task;
      state[taskId] = idx+1 === (state[taskId]||0) ? idx : idx+1;
      saveDayToServer(date);
      renderMonth();
      renderSidebarStats();
    });
  });
}

function renderMonth(){
  const titleEl = document.getElementById('calMonthTitle');
  const first = new Date(viewYear, viewMonth, 1);
  titleEl.textContent = first.toLocaleDateString('en-US', {month:'long', year:'numeric'});

  const grid = document.getElementById('monthGrid');
  grid.innerHTML = '';

  const startDow = first.getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();

  for(let i=0;i<startDow;i++){
    const blank = document.createElement('div');
    blank.className = 'day-cell empty';
    grid.appendChild(blank);
  }

  for(let day=1; day<=daysInMonth; day++){
    const date = new Date(viewYear, viewMonth, day);
    const cell = document.createElement('div');
    const stateClass = dayStateClass(date);
    const isFuture = date > TODAY;
    cell.className = 'day-cell ' + stateClass + (isSameDate(date,TODAY)?' is-today':'') + (isFuture?' future':'');

    const tasks = getTaskDefForDate(date);
    const state = getState(date);
    const {done,total} = dayCompletion(date);

    const dayMilestone = findMilestoneOnDate(date);

    const tasksHtml = tasks.map(t=>renderMiniTaskHtml(date,t,state)).join('');

    cell.innerHTML = `
      ${dayMilestone? `<div class="milestone-marker" title="${dayMilestone.name}"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2l2.4 7.2H22l-6 4.4 2.3 7.1L12 16.3 5.7 20.7 8 13.6 2 9.2h7.6z" fill="${dayMilestone.color}"/></svg></div>`:''}
      <div class="day-cell-content">
        <div class="day-top-row">
          <div class="day-num">${day}</div>
          ${isFuture?'':`<span class="day-frac-pill">${done}/${total}</span>`}
        </div>
        <div class="mini-task-list">${tasksHtml}</div>
      </div>
    `;

    wireDayCellEvents(cell, date);
    grid.appendChild(cell);
  }
}

function isSameDate(a,b){
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}

/* =========================================================
   RENDER: YEAR VIEW
   ========================================================= */
function renderYear(){
  document.getElementById('calMonthTitle').textContent = String(viewYear);

  const grid = document.getElementById('yearGrid');
  grid.innerHTML = '';
  for(let m=0;m<12;m++){
    const monthBox = document.createElement('div');
    monthBox.className = 'year-month';
    const first = new Date(viewYear, m, 1);
    const daysInMonth = new Date(viewYear, m+1, 0).getDate();
    const startDow = first.getDay();

    let cellsHtml = '';
    for(let i=0;i<startDow;i++){
      cellsHtml += `<div class="year-mini-day empty"></div>`;
    }
    for(let day=1; day<=daysInMonth; day++){
      const date = new Date(viewYear, m, day);
      let cls = 'year-mini-day';
      if(date <= TODAY){
        const {frac} = dayCompletion(date);
        if(frac>=0.999) cls += ' complete';
        else if(frac>0) cls += ' partial';
      } else {
        cls += ' empty';
      }
      cellsHtml += `<div class="${cls}" title="${date.toLocaleDateString()}"></div>`;
    }

    monthBox.innerHTML = `<div class="year-month-title">${first.toLocaleDateString('en-US',{month:'long'})}</div><div class="year-mini-grid">${cellsHtml}</div>`;
    grid.appendChild(monthBox);
  }
}

/* =========================================================
   SIDEBAR STATS
   ========================================================= */
let statRange = 'week';

function getRangeDates(range){
  const dates = [];
  let days = range==='week'?7:(range==='month'?30:365);
  for(let i=days-1;i>=0;i--){
    const d = new Date(TODAY);
    d.setDate(d.getDate()-i);
    if(d<=TODAY) dates.push(d);
  }
  return dates;
}

function renderSidebarStats(){
  const dates = getRangeDates(statRange);
  let totalDone=0, totalTasks=0;
  const habitTotals = {};

  dates.forEach(d=>{
    const tasks = getTaskDefForDate(d);
    const state = getState(d);
    tasks.forEach(t=>{
      const key = t.id;
      if(!habitTotals[key]) habitTotals[key] = {label:t.sidebarLabel || t.short, done:0, total:0};
      habitTotals[key].total++;
      if(isTaskDone(state,t)){
        habitTotals[key].done++;
        totalDone++;
      }
      totalTasks++;
    });
  });

  const pct = totalTasks? Math.round(totalDone/totalTasks*100) : 0;
  document.getElementById('statHeroNum').textContent = pct+'%';
  document.getElementById('statHeroLabel').textContent = `completion rate · this ${statRange}`;

  // streaks (based on full data through today, independent of range toggle)
  const {current, longest} = computeStreaks();
  document.getElementById('currentStreak').textContent = current;
  document.getElementById('longestStreak').textContent = longest;

  // habit bars
  const barList = document.getElementById('habitBarList');
  barList.innerHTML = '';
  Object.values(habitTotals).forEach(h=>{
    const hpct = h.total? Math.round(h.done/h.total*100):0;
    const row = document.createElement('div');
    row.className = 'habit-bar-item';
    row.innerHTML = `
      <div class="habit-bar-top"><span>${h.label}</span><span>${h.done}/${h.total}</span></div>
      <div class="habit-bar-track"><div class="habit-bar-fill" style="width:${hpct}%"></div></div>
    `;
    barList.appendChild(row);
  });
}

function computeStreaks(){
  let current=0, longest=0, run=0;
  // walk backward from today
  let d = new Date(TODAY);
  while(true){
    const {frac} = dayCompletion(d);
    if(frac>=0.999){
      current++;
      d.setDate(d.getDate()-1);
    } else break;
  }
  // longest streak across stored history
  const keys = Object.keys(STORE).sort();
  keys.forEach(k=>{
    const [y,m,day] = k.split('-').map(Number);
    const date = new Date(y,m-1,day);
    const {frac} = dayCompletion(date);
    if(frac>=0.999){
      run++;
      longest = Math.max(longest, run);
    } else run=0;
  });
  longest = Math.max(longest, current);
  return {current, longest};
}

/* =========================================================
   MILESTONES — carousel, add/edit modal, past list
   ========================================================= */
let milestoneCarouselIndex = 0;
let editingMilestoneId = null; // null = adding new

function computeMilestoneCompletionPct(milestone){
  if(!milestone.startDate) return 0;
  const start = parseISODate(milestone.startDate);
  const end = parseISODate(milestone.date);
  const rangeEnd = TODAY < end ? TODAY : end; // don't count days beyond today (haven't happened) or beyond the end date

  if(start > rangeEnd) return 0; // milestone hasn't started yet

  let totalFrac = 0, dayCount = 0;
  const cursor = new Date(start);
  while(cursor <= rangeEnd){
    const {frac} = dayCompletion(new Date(cursor));
    totalFrac += frac;
    dayCount++;
    cursor.setDate(cursor.getDate()+1);
  }
  return dayCount ? Math.round((totalFrac/dayCount)*100) : 0;
}

function renderMilestoneCard(m){
  const days = Math.ceil((parseISODate(m.date) - TODAY) / 86400000);
  const safeDays = Math.max(days, 0);
  const pct = computeMilestoneCompletionPct(m);

  return `
    <div class="milestone-card" style="--accent:${m.color}">
      <div class="milestone-card-top">
        <div class="milestone-eyebrow">${parseISODate(m.date).toLocaleDateString('en-US',{month:'short', day:'numeric', year:'numeric'})}</div>
        <button class="milestone-edit-btn" data-edit="${m.id}" aria-label="Edit milestone">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        </button>
      </div>
      <div class="milestone-title">${m.name}</div>
      <div class="milestone-count-row">
        <span class="milestone-num">${safeDays}</span>
        <span class="milestone-unit">days to go</span>
      </div>
      <div class="milestone-weeks">${Math.floor(safeDays/7)} week${Math.floor(safeDays/7)===1?'':'s'} left</div>
      <div class="milestone-bar-track"><div class="milestone-bar-fill" style="width:${pct}%"></div></div>
    </div>
  `;
}

function renderMilestones(){
  const active = getActiveMilestones();
  const grid = document.getElementById('milestonesGrid');
  grid.innerHTML = '';

  const perPage = 2;
  // total "items" = real milestones + 1 virtual add-card slot at the end
  const totalItems = active.length + 1;
  const maxIndex = Math.max(0, totalItems - perPage);
  if(milestoneCarouselIndex > maxIndex) milestoneCarouselIndex = maxIndex;
  if(milestoneCarouselIndex < 0) milestoneCarouselIndex = 0;

  for(let slot=0; slot<perPage; slot++){
    const itemIndex = milestoneCarouselIndex + slot;
    if(itemIndex < active.length){
      grid.insertAdjacentHTML('beforeend', renderMilestoneCard(active[itemIndex]));
    } else if(itemIndex === active.length){
      grid.insertAdjacentHTML('beforeend', `
        <div class="milestone-add-card" id="addMilestoneCard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          <span>Add milestone</span>
        </div>
      `);
    }
  }

  document.getElementById('milestonePrev').disabled = milestoneCarouselIndex <= 0;
  document.getElementById('milestoneNext').disabled = milestoneCarouselIndex >= maxIndex;

  // wire edit buttons
  grid.querySelectorAll('[data-edit]').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      openMilestoneModal(btn.dataset.edit);
    });
  });
  const addCard = document.getElementById('addMilestoneCard');
  if(addCard) addCard.addEventListener('click', ()=>openMilestoneModal(null));
}

function openMilestoneModal(id){
  editingMilestoneId = id;
  const overlay = document.getElementById('milestoneModalOverlay');
  const title = document.getElementById('milestoneModalTitle');
  const nameInput = document.getElementById('milestoneNameInput');
  const startDateInput = document.getElementById('milestoneStartDateInput');
  const dateInput = document.getElementById('milestoneDateInput');
  const deleteBtn = document.getElementById('milestoneDeleteBtn');

  if(id){
    const m = MILESTONES.find(x=>x.id===id);
    title.textContent = 'Edit milestone';
    nameInput.value = m.name;
    startDateInput.value = m.startDate || '';
    dateInput.value = m.date;
    deleteBtn.style.display = '';
  } else {
    title.textContent = 'Add milestone';
    nameInput.value = '';
    startDateInput.value = '';
    dateInput.value = '';
    deleteBtn.style.display = 'none';
  }
  overlay.classList.add('show');
  nameInput.focus();
}

function closeMilestoneModal(){
  document.getElementById('milestoneModalOverlay').classList.remove('show');
  editingMilestoneId = null;
}

document.getElementById('milestoneCancelBtn').addEventListener('click', closeMilestoneModal);
document.getElementById('milestoneModalOverlay').addEventListener('click', (e)=>{
  if(e.target.id === 'milestoneModalOverlay') closeMilestoneModal();
});

document.getElementById('milestoneSaveBtn').addEventListener('click', ()=>{
  const name = document.getElementById('milestoneNameInput').value.trim();
  const startDate = document.getElementById('milestoneStartDateInput').value;
  const date = document.getElementById('milestoneDateInput').value;
  if(!name || !date || !startDate){
    alert('Please enter a name, start date, and end date.');
    return;
  }
  if(startDate > date){
    alert('Start date must be before the end date.');
    return;
  }
  let savedMilestone;
  if(editingMilestoneId){
    const m = MILESTONES.find(x=>x.id===editingMilestoneId);
    m.name = name; m.startDate = startDate; m.date = date; m.color = MILESTONE_COLOR;
    savedMilestone = m;
  } else {
    savedMilestone = {id:'ms_'+Date.now(), name, startDate, date, color:MILESTONE_COLOR};
    MILESTONES.push(savedMilestone);
  }
  saveMilestoneToServer(savedMilestone);
  closeMilestoneModal();
  renderMilestones();
  renderMonth();
});

document.getElementById('milestoneDeleteBtn').addEventListener('click', ()=>{
  if(editingMilestoneId){
    MILESTONES = MILESTONES.filter(x=>x.id!==editingMilestoneId);
    deleteMilestoneFromServer(editingMilestoneId);
  }
  closeMilestoneModal();
  renderMilestones();
  renderMonth();
});

document.getElementById('milestonePrev').addEventListener('click', ()=>{
  milestoneCarouselIndex -= 2;
  renderMilestones();
});
document.getElementById('milestoneNext').addEventListener('click', ()=>{
  milestoneCarouselIndex += 2;
  renderMilestones();
});

function renderPastMilestones(){
  const past = getPastMilestones();
  const list = document.getElementById('pastMilestonesList');
  if(past.length === 0){
    list.innerHTML = '<div class="past-empty">No past milestones yet.</div>';
    return;
  }
  list.innerHTML = past.map(m=>`
    <div class="past-item">
      <div class="past-item-dot" style="background:${m.color}"></div>
      <div class="past-item-title">${m.name}</div>
      <div class="past-item-date">${parseISODate(m.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
    </div>
  `).join('');
}

document.getElementById('pastMilestonesLink').addEventListener('click', ()=>{
  renderPastMilestones();
  document.getElementById('pastMilestonesOverlay').classList.add('show');
});
document.getElementById('pastMilestonesCloseBtn').addEventListener('click', ()=>{
  document.getElementById('pastMilestonesOverlay').classList.remove('show');
});
document.getElementById('pastMilestonesOverlay').addEventListener('click', (e)=>{
  if(e.target.id === 'pastMilestonesOverlay') document.getElementById('pastMilestonesOverlay').classList.remove('show');
});

/* =========================================================
   VIEW TOGGLES & NAV
   ========================================================= */
document.querySelectorAll('.view-toggle button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.view-toggle button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const view = btn.dataset.view;
    currentView = view;
    document.getElementById('monthView').style.display = view==='month' ? '' : 'none';
    document.getElementById('yearView').style.display = view==='year' ? '' : 'none';
    document.getElementById('prevMonth').setAttribute('aria-label', view==='year' ? 'Previous year' : 'Previous month');
    document.getElementById('nextMonth').setAttribute('aria-label', view==='year' ? 'Next year' : 'Next month');
    if(view==='year') renderYear();
    else renderMonth();
  });
});

document.querySelectorAll('.stat-toggle button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.stat-toggle button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    statRange = btn.dataset.range;
    renderSidebarStats();
  });
});

document.getElementById('prevMonth').addEventListener('click', ()=>{
  if(currentView === 'year'){
    viewYear--;
    renderYear();
  } else {
    viewMonth--;
    if(viewMonth<0){viewMonth=11; viewYear--;}
    renderMonth();
  }
});
document.getElementById('nextMonth').addEventListener('click', ()=>{
  if(currentView === 'year'){
    viewYear++;
    renderYear();
  } else {
    viewMonth++;
    if(viewMonth>11){viewMonth=0; viewYear++;}
    renderMonth();
  }
});

document.getElementById('sidebarDrag').addEventListener('click', ()=>{
  document.getElementById('sidebar').classList.toggle('expanded');
});

/* =========================================================
   INIT
   ========================================================= */
async function init(){
  document.getElementById('monthGrid').innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--ink-soft); font-family:Space Mono, monospace; font-size:13px;">Loading your data…</div>';
  await loadAllData();
  renderMonth();
  renderSidebarStats();
  renderMilestones();
}
init();
</script>
